name: Deploy Storybook Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Build Storybook
        run: npm run storybook:build

      - name: Deploy to production
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          wranglerVersion: "4.78.0"

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{secrets.CLOUDFLARE_API_TOKEN}}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"
          wranglerVersion: "4.78.0"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ steps.preview.outputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- storybook-preview -->';
            const shortSha = context.payload.pull_request.head.sha.substring(0, 8);
            const now = new Date().toLocaleDateString('en-US', {
              year: 'numeric', month: 'short', day: 'numeric',
              hour: '2-digit', minute: '2-digit',
              timeZone: 'America/New_York'
            });
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            const branch = context.payload.pull_request.head.ref;

            const body = [
              marker,
              `## Storybook Preview 👀`,
              ``,
              `- **Preview:** [Open Storybook PR Preview](${deploymentUrl})`,
              `- **Branch:** \`${branch}\``,
              `- **Latest Commit:** \`${shortSha}\``,
              `- **Updated:** ${now} (ET)`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
