name: Generate New Playwright Screenshots
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to checkout and run tests on"
        required: true
        type: string

jobs:
  screenshots:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      HOME: /root
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Install Playwright Browsers
        run: npm run playwright:install

      - name: Run Playwright to generate screenshots
        run: npm run playwright:update-snapshots

      - name: Upload new screenshots
        uses: actions/upload-artifact@v7
        with:
          name: playwright-snapshots
          path: e2e/**/*-snapshots/
          retention-days: 30
